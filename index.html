<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Module</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #555; --accent: #a8ff78; --bubble-me: #1a2e1a; --bubble-other: #141414; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .chat-wrapper { width: 100%; max-width: 520px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; height: min(680px, 85vh); box-shadow: 0 24px 80px rgba(0,0,0,0.6); }
    .chat-header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 18px 22px; display: flex; align-items: center; gap: 14px; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #78ffd6); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .user-info { flex: 1; }
    .user-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
    .status { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .header-actions { display: flex; gap: 10px; }
    .icon-btn { width: 34px; height: 34px; border-radius: 8px; background: none; border: 1px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: border-color 0.2s, color 0.2s; }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .date-divider { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; display: flex; align-items: center; gap: 12px; }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .msg-row { display: flex; gap: 10px; align-items: flex-end; animation: msgIn 0.3s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg-row.me { flex-direction: row-reverse; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); }
    .msg-row.me .msg-avatar { background: linear-gradient(135deg, var(--accent), #78ffd6); }
    .bubble-group { display: flex; flex-direction: column; gap: 4px; max-width: 75%; }
    .msg-row.me .bubble-group { align-items: flex-end; }
    .bubble { padding: 10px 14px; border-radius: 16px; font-size: 0.9rem; line-height: 1.5; word-break: break-word; }
    .msg-row:not(.me) .bubble { background: var(--bubble-other); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg-row.me .bubble { background: var(--bubble-me); border: 1px solid rgba(168,255,120,0.2); border-bottom-right-radius: 4px; color: #d6ffc2; }
    .bubble.last { border-radius: 16px; }
    .msg-time { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); padding: 0 2px; }
    .typing-row { display: flex; gap: 10px; align-items: flex-end; }
    .typing-bubble { background: var(--bubble-other); border: 1px solid var(--border); padding: 12px 16px; border-radius: 16px; border-bottom-left-radius: 4px; display: flex; gap: 5px; align-items: center; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: typingBounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); background: var(--accent); } }
    .typing-indicator { display: none; }
    .typing-indicator.show { display: flex; }
    .chat-input-area { background: var(--surface2); border-top: 1px solid var(--border); padding: 16px 20px; }
    .emoji-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .emoji-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 1rem; cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
    .emoji-btn:hover { border-color: var(--accent); transform: scale(1.15); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .msg-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem; padding: 12px 16px; border-radius: 12px; outline: none; resize: none; max-height: 120px; min-height: 46px; overflow-y: auto; transition: border-color 0.2s; line-height: 1.5; }
    .msg-input:focus { border-color: var(--accent); }
    .msg-input::placeholder { color: var(--muted); }
    .send-btn { width: 46px; height: 46px; background: var(--accent); border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: transform 0.2s, box-shadow 0.2s; flex-shrink: 0; }
    .send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168,255,120,0.3); }
    .send-btn:active { transform: scale(0.94); }
  </style>
</head>
<body>

  <div class="chat-wrapper">

    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div class="user-info">
        <div class="user-name">Alex Dev</div>
        <div class="status"><span class="status-dot"></span> Online</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="Call">📞</button>
        <button class="icon-btn" title="Video">📹</button>
        <button class="icon-btn" title="More">⋮</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="date-divider">Today</div>

      <div class="msg-row">
        <div class="msg-avatar">🤖</div>
        <div class="bubble-group">
          <div class="bubble">Hey! How's the project going? 👋</div>
          <div class="bubble">Did you finish the login module?</div>
          <div class="msg-time">10:24 AM</div>
        </div>
      </div>

      <div class="msg-row me">
        <div class="msg-avatar">🧑</div>
        <div class="bubble-group">
          <div class="bubble">Yeah! Just deployed it 🚀</div>
          <div class="bubble">React hooks made it super clean</div>
          <div class="msg-time">10:26 AM · ✓✓</div>
        </div>
      </div>

      <div class="msg-row">
        <div class="msg-avatar">🤖</div>
        <div class="bubble-group">
          <div class="bubble">That's awesome! What about the chat module? 😄</div>
          <div class="msg-time">10:27 AM</div>
        </div>
      </div>

      <div class="msg-row me">
        <div class="msg-avatar">🧑</div>
        <div class="bubble-group">
          <div class="bubble">You're literally looking at it 😂</div>
          <div class="msg-time">10:28 AM · ✓✓</div>
        </div>
      </div>

      <div class="typing-row typing-indicator" id="typingIndicator">
        <div class="msg-avatar">🤖</div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="emoji-row">
        <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
        <button class="emoji-btn" onclick="addEmoji('🚀')">🚀</button>
        <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
        <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
        <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
        <button class="emoji-btn" onclick="addEmoji('✨')">✨</button>
      </div>
      <div class="input-row">
        <textarea class="msg-input" id="msgInput" placeholder="Type a message..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('msgInput');
    const typing     = document.getElementById('typingIndicator');

    const botReplies = [
      "That's really cool! 🔥",
      "Haha, nice work! 😂",
      "Sounds great, keep it up! 💪",
      "Wow, you're on a roll today 🚀",
      "Interesting! Tell me more 👀",
      "Lol 😂 you're killing it!",
      "I'll push that to GitHub later ✨",
      "React is the best choice for this 💯",
    ];

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function addEmoji(e) {
      inputEl.value += e;
      inputEl.focus();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function scrollBottom() {
      setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 50);
    }

    function appendMessage(text, isMe) {
      const row = document.createElement('div');
      row.className = 'msg-row' + (isMe ? ' me' : '');
      row.innerHTML = `
        <div class="msg-avatar">${isMe ? '🧑' : '🤖'}</div>
        <div class="bubble-group">
          <div class="bubble">${text}</div>
          <div class="msg-time">${getTime()}${isMe ? ' · ✓✓' : ''}</div>
        </div>`;
      messagesEl.insertBefore(row, typing);
      scrollBottom();
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      appendMessage(text, true);
      inputEl.value = '';
      inputEl.style.height = 'auto';

      // show typing
      typing.classList.add('show');
      scrollBottom();

      // bot reply
      setTimeout(() => {
        typing.classList.remove('show');
        const reply = botReplies[Math.floor(Math.random() * botReplies.length)];
        appendMessage(reply, false);
      }, 1400 + Math.random() * 800);
    }
  </script>
</body>
</html>
